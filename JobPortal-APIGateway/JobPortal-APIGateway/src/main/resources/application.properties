spring.application.name=JOBPORTAL-API-GATEWAY

server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.server.webflux.discovery.locator.enabled=true
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webflux.routes[0].id=user-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://JOBPORTAL-USERSERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/users/**

spring.cloud.gateway.server.webflux.routes[1].id=job-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://JOBPORTAL-JOB-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/job/**

spring.cloud.gateway.server.webflux.routes[2].id=application-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://JOBPORTAL-APPLICATIONSERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/application/**